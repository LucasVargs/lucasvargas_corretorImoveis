<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel | Lucas Vargas</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <div class="logo">Lucas Vargas</div>
        <div class="nav-links">
          <a href="index.html">Site</a>
          <span class="badge">Painel Admin</span>
        </div>
      </nav>
    </header>

    <main>
      <section class="admin-hero">
        <div>
          <h1>Painel Administrativo</h1>
          <p>
            Cadastre, edite ou remova imóveis. Tudo fica salvo no navegador
            usando armazenamento local.
          </p>
        </div>
        <button id="clear-all" class="btn-outline">Limpar todos</button>
      </section>

      <section class="admin-grid">
        <form id="property-form" class="admin-card">
          <h2>Novo imóvel</h2>
          <input type="hidden" id="property-id" />
          <label>
            Título
            <input id="title" type="text" placeholder="Apartamento Jardim" />
          </label>
          <label>
            Tipo
            <input id="type" type="text" placeholder="Apartamento, Casa, Sala" />
          </label>
          <label>
            Localização
            <input id="location" type="text" placeholder="Porto Velho" />
          </label>
          <label>
            Valor
            <input id="price" type="number" placeholder="350000" />
          </label>
          <label>
            Área (m²)
            <input id="area" type="number" placeholder="120" />
          </label>
          <label>
            Quartos
            <input id="beds" type="number" placeholder="3" />
          </label>
          <label>
            Imagem (URL)
            <input id="image" type="text" placeholder="https://..." />
          </label>
          <button type="submit" class="btn-solid" id="save-btn">Salvar</button>
          <button type="button" class="btn-ghost" id="cancel-btn">Cancelar edição</button>
        </form>

        <div class="admin-card">
          <h2>Imóveis cadastrados</h2>
          <div id="property-list" class="property-list"></div>
          <div id="empty-admin" class="empty-admin">
            Nenhum imóvel cadastrado ainda.
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Alterações locais. Para publicar online, iremos conectar a um backend.</p>
    </footer>

    <script src="admin.js"></script>
  </body>
</html>
